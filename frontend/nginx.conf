server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # 后端 API：与 Vite 开发代理路径一致（无前缀 /api）
    location ~ ^/(health|docs|redoc|openapi\.json|openapi\.yaml|dashboard|suppliers|materials|products|purchase-orders|sales-orders|production|warehouses|supplier-portal|sourcing|contracts|contract-templates|announcements|logistics|financial|qualification|collaboration)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
